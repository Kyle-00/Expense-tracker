<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="app__header">
      <h1>Expense Tracker</h1>
      <p class="app__subtitle">Keep track of your daily spending</p>
    </header>

    <main class="app__main">
      <!-- Add Expense Form -->
      <section class="card" aria-labelledby="form-heading">
        <h2 id="form-heading">Add a New Expense</h2>
        <form id="expense-form" class="expense-form">
          <div class="form-group">
            <label for="description">Description</label>
            <input
              type="text"
              id="description"
              name="description"
              placeholder="e.g. Groceries"
              required
            />
          </div>

          <div class="form-group">
            <label for="amount">Amount ($)</label>
            <input
              type="number"
              id="amount"
              name="amount"
              placeholder="0.00"
              min="0.01"
              step="0.01"
              required
            />
          </div>

          <div class="form-group">
            <label for="category">Category</label>
            <select id="category" name="category" required>
              <option value="" disabled selected>Select category</option>
              <option value="Food">Food</option>
              <option value="Transportation">Transportation</option>
              <option value="Entertainment">Entertainment</option>
              <option value="Utilities">Utilities</option>
              <option value="Shopping">Shopping</option>
              <option value="Health">Health</option>
              <option value="Other">Other</option>
            </select>
          </div>

          <button type="submit" class="btn btn--primary">Add Expense</button>
        </form>
      </section>

      <!-- Filter & Total Section -->
      <section class="card card--summary">
        <div class="form-group">
          <label for="filter-category">Filter by Category</label>
          <select id="filter-category">
            <option value="all">All Categories</option>
            <option value="Food">Food</option>
            <option value="Transportation">Transportation</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Utilities">Utilities</option>
            <option value="Shopping">Shopping</option>
            <option value="Health">Health</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="total-display">
          <span class="total-display__label">Total Expenses</span>
          <span class="total-display__amount" id="total-amount">$0.00</span>
        </div>
      </section>

      <!-- Expense List -->
      <section class="card">
        <h2>Your Expenses</h2>
        <ul id="expense-list" class="expense-list">
          <!-- Expense items injected by JavaScript -->
        </ul>
        <p id="empty-message" class="empty-message">No expenses recorded yet.</p>
      </section>
    </main>

    <footer class="app__footer">
      <p>Built with HTML, CSS &amp; JavaScript &mdash; data saved in your browser</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
